name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ultimate-car-care/package-lock.json

      - name: Install
        working-directory: ultimate-car-care
        run: npm ci

      - name: Build (static export)
        working-directory: ultimate-car-care
        run: npm run build

      - name: Assemble Pages site
        run: |
          # Build site root from current repo, replacing the source
          # ultimate-car-care/ folder with the static export.
          mkdir -p _site
          rsync -a --exclude='ultimate-car-care' --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
          rm -rf _site/ultimate-car-care
          mv ultimate-car-care/out _site/ultimate-car-care

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
